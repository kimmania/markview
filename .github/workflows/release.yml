name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Markview ${{ github.ref_name }}'
          releaseBody: |
            Built from tag `${{ github.ref_name }}`.
            Download the `.dmg` below for Apple Silicon (M1–M5 and later).
            *Note: This `.dmg` is unsigned — right-click → Open on first launch.*
          releaseDraft: true
          prerelease: false
